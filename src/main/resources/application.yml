micronaut:
  application:
    name: kaiju
  metrics:
    enabled: true
datasources:
  default:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: ''
    driver-class-name: org.postgresql.Driver
    db-type: postgres
    schema-generate: CREATE_DROP
    dialect: POSTGRES
micrometer:
  observation:
    http:
      server:
        enabled: true
      client:
        enabled: true
